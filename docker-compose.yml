version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lana_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lana
      POSTGRES_PASSWORD: lana_password
      POSTGRES_DB: lana_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

